name: Spotless
on: [ push ]
jobs:
  Formatting:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Spotless
        run: |
          echo "Run './gradlew spotlessApply' to auto-format"
          ./gradlew spotlessCheck
